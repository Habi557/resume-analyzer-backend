spring.application.name=resume-ai-backend
#spring.ai.ollama.chat.model=qwen2.5:3b
spring.ai.ollama.chat.client.enabled=false
spring.ai.ollama.chat.options.timeout=30000
#spring.ai.ollama.base-url=http://ai-model-ollama:11434
spring.datasource.url=jdbc:mysql://localhost:3306/AIresumeDb
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
# spring.main.banner-mode=off
logging.level.root=warn
#logging.level.org.hibernate.SQL=trace
#logging.level.org.hibernate.orm.jdbc.bind=trace
upload.dir=/Users/habi/Documents/resume-screener/uploads/resumes
# Let JPA generate the schema SQL to a file (does NOT execute it)
spring.jpa.hibernate.ddl-auto=none
#spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=create
#spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-target=src/main/resources/db/migration/V1__create_tables.sql
#  Email config
#  nwed lyam dxqb ifcv
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username= ${EMAIL_USERNAME}
spring.mail.password= ${pass}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.thymeleaf.prefix = classpath:/templates/

spring.thymeleaf.suffix = .html
spring.thymeleaf.mode=HTML

#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true




# ==============================
# Google OAuth2 Configuration
# ==============================
spring.security.oauth2.client.registration.google.client-id=${OAUTH_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${OAUTH_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
#spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/oauth2/callback
spring.security.oauth2.client.registration.google.client-name=Google

# Authorization & Token Endpoints
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

server.port=8080

oauth2url=http://localhost:4200/



server.tomcat.connection-timeout=300000
spring.mvc.async.request-timeout=300000

logging.file.name=/var/log/app.log
spring.actuator.enabled=true
management.endpoints.web.exposure.include=*
# AWS S3 Bucket
cloud.aws.region=ap-south-1
cloud.aws.s3.bucket=myprojectforangular

# Redis Config
spring.data.redis.host=localhost
spring.data.redis.port=6379


# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.repair-on-migrate=true


# ResumeAnalysis concurrency
resume.analysis.page-size=10
resume.analysis.ai-concurrency=2





